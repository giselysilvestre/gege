<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gegê — Upload de CVs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F1EB; color: #111; min-height: 100vh; padding: 40px 24px; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.sub { color: #666; font-size: 14px; margin-bottom: 32px; }
.drop { border: 2px dashed #ccc; border-radius: 16px; padding: 48px; text-align: center; background: white; cursor: pointer; transition: border-color 0.2s; margin-bottom: 24px; }
.drop:hover, .drop.over { border-color: #AFAB23; background: #F4F7E4; }
.drop p { color: #888; font-size: 14px; margin-top: 8px; }
input[type=file] { display: none; }
button { background: #111; color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 32px; }
button:disabled { background: #ccc; cursor: not-allowed; }
.results { display: flex; flex-direction: column; gap: 12px; }
.card { background: white; border-radius: 14px; padding: 16px 20px; border: 1px solid #E8E3D9; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-nome { font-weight: 600; font-size: 15px; }
.card-file { font-size: 12px; color: #888; }
.card-info { display: flex; gap: 12px; flex-wrap: wrap; font-size: 13px; color: #555; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-alto { background: #D1FAE5; color: #065F46; }
.badge-medio { background: #FEF3C7; color: #92400E; }
.badge-baixo { background: #FEE2E2; color: #991B1B; }
.badge-criado { background: #E0E7FF; color: #3730A3; }
.badge-atualizado { background: #F3F4F6; color: #374151; }
.erro { color: #DC2626; font-size: 13px; }
.loading { text-align: center; color: #888; font-size: 14px; padding: 24px; }
.file-list { margin-bottom: 16px; }
.file-item { font-size: 13px; color: #555; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
.score { font-size: 20px; font-weight: 700; color: #AFAB23; }
</style>
</head>
<body>
<h1>upload de currículos</h1>
<p class="sub">arraste PDFs ou clique para selecionar — processa e salva automaticamente no banco</p>

<div class="drop" id="drop" onclick="document.getElementById('fileInput').click()">
  <div style="font-size: 32px;">+</div>
  <p>arraste PDFs aqui ou clique para selecionar</p>
  <p>múltiplos arquivos aceitos</p>
</div>
<input type="file" id="fileInput" multiple accept=".pdf">

<div class="file-list" id="fileList"></div>

<button id="btn" onclick="processar()" disabled>processar CVs</button>

<div id="results" class="results"></div>

<script>
let arquivos = [];

const drop = document.getElementById('drop');
const input = document.getElementById('fileInput');
const btn = document.getElementById('btn');
const fileList = document.getElementById('fileList');
const results = document.getElementById('results');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('over');
  adicionarArquivos(e.dataTransfer.files);
});
input.addEventListener('change', () => adicionarArquivos(input.files));

function adicionarArquivos(files) {
  for (const f of files) {
    if (f.type === 'application/pdf' && !arquivos.find(a => a.name === f.name)) {
      arquivos.push(f);
    }
  }
  atualizarLista();
}

function atualizarLista() {
  fileList.innerHTML = arquivos.map(f => `<div class="file-item">${f.name} — ${(f.size/1024).toFixed(0)} KB</div>`).join('');
  btn.disabled = arquivos.length === 0;
  btn.textContent = arquivos.length > 0 ? `processar ${arquivos.length} CV${arquivos.length > 1 ? 's' : ''}` : 'processar CVs';
}

async function processar() {
  btn.disabled = true;
  btn.textContent = 'processando...';
  results.innerHTML = '<div class="loading">analisando CVs com IA...</div>';

  const form = new FormData();
  arquivos.forEach(f => form.append('cvs', f));

  try {
    const res = await fetch('/processar', { method: 'POST', body: form });
    const data = await res.json();
    mostrarResultados(data);
  } catch(e) {
    results.innerHTML = `<div class="card erro">Erro: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = `processar ${arquivos.length} CV${arquivos.length > 1 ? 's' : ''}`;
}

function mostrarResultados(data) {
  if (!Array.isArray(data)) {
    results.innerHTML = `<div class="card erro">Erro: ${data.erro}</div>`;
    return;
  }
  results.innerHTML = data.map(r => {
    if (r.erro) return `<div class="card"><div class="card-header"><span class="card-nome">${r.filename}</span></div><div class="erro">${r.erro}</div></div>`;
    const fitClass = r.fit === 'Alto' ? 'alto' : r.fit === 'Médio' ? 'medio' : 'baixo';
    return `<div class="card">
      <div class="card-header">
        <span class="card-nome">${r.nome || '—'}</span>
        <span class="card-file">${r.filename}</span>
      </div>
      <div class="card-info">
        <span>${r.cargo || '—'}</span>
        <span class="score">${r.score || '—'}</span>
        <span class="badge badge-${fitClass}">${r.fit || '—'}</span>
        <span class="badge badge-${r.operacao}">${r.operacao}</span>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
